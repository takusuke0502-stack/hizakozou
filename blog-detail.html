<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事詳細｜整体院ひざこぞう</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* ベース設定 */
    body { font-family: 'BIZ UDPGothic', 'Noto Sans JP', sans-serif; letter-spacing: 0.04em; line-height: 1.8; color: #334155; }
    .bg-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
    
    /* ----------------------------------------------------------------
       MicroCMSのリッチエディタ（本文）から出力されるHTMLの自動スタイリング
       ---------------------------------------------------------------- */
    #blog-content h2 { font-size: 1.5rem; font-weight: 900; color: #1e3a8a; border-bottom: 2px solid #bfdbfe; padding-bottom: 0.5rem; margin-top: 2.5rem; margin-bottom: 1.5rem; }
    #blog-content h3 { font-size: 1.25rem; font-weight: bold; color: #334155; margin-top: 2rem; margin-bottom: 1rem; border-left: 4px solid #3b82f6; padding-left: 10px; }
    #blog-content p { margin-bottom: 1.5rem; line-height: 2; }
    #blog-content img { max-width: 100%; height: auto; border-radius: 0.75rem; margin: 2rem 0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    #blog-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.5rem; }
    #blog-content li { margin-bottom: 0.5rem; }
    #blog-content blockquote { border-left: 4px solid #cbd5e1; background-color: #f8fafc; padding: 1rem; margin-bottom: 1.5rem; border-radius: 0 0.5rem 0.5rem 0; color: #475569; }
    /* 「太字」に黄色のマーカー風の装飾を適用 */
    #blog-content strong { color: #b91c1c; font-weight: 900; background: linear-gradient(transparent 60%, #fde047 60%); }
    #blog-content a { color: #2563eb; text-decoration: underline; }
  </style>
</head>
<body class="bg-slate-50 relative pb-24 md:pb-0 pt-24">

  <header class="fixed top-0 left-0 right-0 z-50 bg-nav border-b border-slate-200 shadow-sm">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <a href="index.html" class="flex flex-col cursor-pointer hover:opacity-80 transition">
        <span class="text-[10px] md:text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded inline-block w-max mb-1">柏市 / 国家資格者による整体</span>
        <h1 class="text-lg md:text-2xl font-black text-slate-800 leading-none">整体院ひざこぞう</h1>
      </a>
      <a href="index.html" class="text-sm font-bold text-blue-600 flex items-center gap-1 hover:text-blue-800 transition bg-blue-50 px-4 py-2 rounded-full">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> トップページへ戻る
      </a>
    </div>
  </header>

  <main class="container mx-auto px-4 max-w-3xl py-12 min-h-screen">
    
    <div id="loading" class="text-center py-20 text-slate-500 font-bold flex flex-col items-center gap-4">
      <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-blue-600"></i>
      記事を読み込んでいます...
    </div>

    <article id="article-container" class="hidden bg-white p-6 md:p-12 rounded-3xl shadow-lg border border-slate-100">
      
      <p id="blog-date" class="text-slate-500 font-bold text-sm mb-3 flex items-center gap-2"></p>
      <h1 id="blog-title" class="text-2xl md:text-3xl lg:text-4xl font-black text-slate-900 leading-tight mb-8"></h1>
      
      <img id="blog-eyecatch" src="" alt="" class="w-full h-auto rounded-2xl mb-10 shadow-md hidden object-cover max-h-[450px]">
      
      <div id="blog-content" class="text-slate-700 text-base md:text-lg"></div>
      
    </article>
    
    <div class="text-center mt-12">
      <a href="index.html#blog-section" class="inline-block bg-slate-800 text-white font-black px-8 py-4 rounded-xl shadow-lg hover:bg-slate-900 transition flex items-center justify-center gap-2 mx-auto w-max">
        <i data-lucide="list" class="w-5 h-5"></i> 他の記事も見る
      </a>
    </div>

  </main>

  <script>
    lucide.createIcons();

    // MicroCMSから「この記事だけ」のデータを取得する処理
    const fetchBlogDetail = async () => {
      // URL（blog-detail.html?id=○○○）から、○○○の部分（記事ID）を抜き出す
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');

      // IDが見つからない場合のエラー処理
      if (!id) {
        document.getElementById('loading').innerHTML = '<i data-lucide="alert-circle" class="w-10 h-10 text-red-500 mb-2"></i>記事が見つかりません。URLが間違っている可能性があります。';
        lucide.createIcons();
        return;
      }

      const serviceDomain = 'hizakozou';
      const apiKey = '2BxAuwOHmLXSqUA7gHVTvV1SlPEJrbbWeDMW';

      try {
        // IDを指定して1件だけ取得
        const response = await fetch(`https://${serviceDomain}.microcms.io/api/v1/blogs/${id}`, {
          headers: { 'X-MICROCMS-API-KEY': apiKey }
        });

        if (!response.ok) throw new Error('Network response was not ok');
        const blog = await response.json();

        // 取得したデータをHTMLに埋め込む
        document.getElementById('blog-title').innerText = blog.title;
        document.getElementById('blog-date').innerHTML = `<i data-lucide="calendar" class="w-4 h-4"></i> ${new Date(blog.publishedAt).toLocaleDateString('ja-JP').replace(/\//g, '.')}`;
        
        // 画像がある場合のみ表示
        if (blog.eyecatch) {
          const imgEl = document.getElementById('blog-eyecatch');
          imgEl.src = blog.eyecatch.url;
          imgEl.classList.remove('hidden');
        }
        
        // リッチエディタの本文を流し込む
        document.getElementById('blog-content').innerHTML = blog.content;

        // ブラウザのタブの名前を「記事のタイトル」に変更
        document.title = `${blog.title}｜整体院ひざこぞう`;

        // 読み込み中画面を消して、記事画面を表示
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('article-container').classList.remove('hidden');
        
        lucide.createIcons();

      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerHTML = '<i data-lucide="alert-circle" class="w-10 h-10 text-red-500 mb-2"></i>通信エラーが発生しました。';
        lucide.createIcons();
      }
    };

    fetchBlogDetail();
  </script>
</body>
</html>
