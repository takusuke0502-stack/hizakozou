name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            このプルリクエストのコードレビューを行ってください。

            以下の観点からフィードバックを日本語で提供してください：
            1. コードの品質と可読性
            2. バグや潜在的な問題
            3. ベストプラクティスへの準拠
            4. セキュリティ上の懸念事項
            5. ブログ生成スクリプト（scripts/generate-blog.mjs）への影響

            重大な問題がある場合は明確に指摘し、改善案も提示してください。
            問題がない場合は簡潔にその旨を伝えてください。
