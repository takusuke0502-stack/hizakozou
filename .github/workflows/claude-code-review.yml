name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Claude Code Review
        if: ${{ secrets.ANTHROPIC_API_KEY != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this pull request and leave concise review comments in Japanese.

            Prioritize findings that could affect:
            1. Code correctness and readability
            2. Bugs or unexpected behavior
            3. Regressions against the repository workflow
            4. Security or reliability concerns
            5. Blog generation rules, especially around scripts/generate-blog.mjs

            If there are no major issues, keep the review short and avoid over-commenting.

      - name: Skip Claude Code Review
        if: ${{ secrets.ANTHROPIC_API_KEY == '' && secrets.CLAUDE_CODE_OAUTH_TOKEN == '' }}
        run: echo "Skipping Claude Code Review because no Claude credential secret is configured."
