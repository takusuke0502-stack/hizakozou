        窶ｻ蠖薙し繧､繝医↓謗ｲ霈峨＆繧後※縺・ｋ縺雁ｮ｢讒倥・螢ｰ縺ｯ蛟倶ｺｺ縺ｮ諢滓Φ縺ｧ縺ゅｊ縲∵・譫懊ｒ菫晁ｨｼ縺吶ｋ繧ゅ・縺ｧ縺ｯ縺ゅｊ縺ｾ縺帙ｓ縲・br><br>
        ﾂｩ 2026 謨ｴ菴馴劼縺ｲ縺悶％縺槭≧ All Rights Reserved.
      </p>
    </div>
  </footer>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="逕ｻ蜒乗僑螟ｧ陦ｨ遉ｺ" class="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-sm items-center justify-center p-4 opacity-0 transition-opacity duration-300" style="display:none;">
    <button id="lightbox-close" onclick="closeLightbox()" class="absolute top-4 right-4 md:top-8 md:right-8 text-white/70 hover:text-white p-2 transition-colors rounded-full" aria-label="逕ｻ蜒上ｒ髢峨§繧・>
      <i data-lucide="x" class="w-10 h-10" aria-hidden="true"></i>
    </button>
    <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl scale-95 transition-transform duration-300">
  </div>

  <div class="fixed bottom-0 left-0 right-0 z-50 md:hidden bg-white border-t border-slate-200 shadow-[0_-5px_20px_rgba(0,0,0,0.1)] p-3 flex gap-3">
    <a href="tel:0471143274"
       class="flex-1 flex items-center justify-center gap-2 bg-slate-800 text-white font-black py-3 rounded-xl text-sm shadow transition active:scale-95">
      <i data-lucide="phone" class="w-4 h-4" aria-hidden="true"></i> 髮ｻ隧ｱ縺吶ｋ
    </a>
    <a href="https://lin.ee/X01F2mP" target="_blank" rel="noopener noreferrer"
       class="flex-1 flex items-center justify-center gap-2 bg-[#06C755] text-white font-black py-3 rounded-xl text-sm shadow transition active:scale-95">
      <i data-lucide="message-circle" class="w-4 h-4" aria-hidden="true"></i> LINE縺ｧ逶ｸ隲・    </a>
  </div>

  <script>
    lucide.createIcons();

    // 繝倥ャ繝繝ｼ繧ｷ繝｣繝峨え
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('shadow-md', window.scrollY > 50);
    });

    // 繝上Φ繝舌・繧ｬ繝ｼ繝｡繝九Η繝ｼ
    const menuBtn   = document.getElementById('menuBtn');
    const mobileNav = document.getElementById('mobileNav');
    menuBtn.addEventListener('click', () => {
      const isOpen = !mobileNav.classList.contains('hidden');
      mobileNav.classList.toggle('hidden');
      menuBtn.setAttribute('aria-expanded', String(!isOpen));
      menuBtn.setAttribute('aria-label', isOpen ? '繝｡繝九Η繝ｼ繧帝幕縺・ : '繝｡繝九Η繝ｼ繧帝哩縺倥ｋ');
    });

    // 繧ｹ繝繝ｼ繧ｹ繧ｹ繧ｯ繝ｭ繝ｼ繝ｫ
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        if (!mobileNav.classList.contains('hidden')) {
          mobileNav.classList.add('hidden');
          menuBtn.setAttribute('aria-expanded', 'false');
          menuBtn.setAttribute('aria-label', '繝｡繝九Η繝ｼ繧帝幕縺・);
        }
        const target = document.querySelector(this.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    });

    // 繝輔か繝ｼ繝騾∽ｿ｡
    const contactForm = document.getElementById('contactForm');
    const submitBtn   = document.getElementById('submitBtn');
    const successMsg  = document.getElementById('successMessage');
    const GAS_URL     = 'https://script.google.com/macros/s/AKfycbz-Q7v0Ghc39ha-rjnVCyLn3ZPq101dHHANCAfjobDqmTvTicii8zQ6VCXhDCYBpFeS/exec';

    function showErr(id, msg) { const el = document.getElementById(id+'-error'); if(el){el.textContent=msg;el.classList.remove('hidden');} }
    function clearErr(id)     { const el = document.getElementById(id+'-error'); if(el) el.classList.add('hidden'); }

    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;
      const nameVal  = document.getElementById('name').value.trim();
      const phoneVal = document.getElementById('phone').value.trim();
      clearErr('name'); clearErr('phone');
      if (!nameVal) { showErr('name', '縺雁錐蜑阪ｒ蜈･蜉帙＠縺ｦ縺上□縺輔＞'); valid = false; }
      if (!phoneVal || !/^[0-9\-\(\)\+\s]{10,15}$/.test(phoneVal)) { showErr('phone', '豁｣縺励＞髮ｻ隧ｱ逡ｪ蜿ｷ繧貞・蜉帙＠縺ｦ縺上□縺輔＞'); valid = false; }
      if (!valid) return;

      const orig = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 騾∽ｿ｡荳ｭ...';
      lucide.createIcons();
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-70');

      try {
        await fetch(GAS_URL, { method:'POST', mode:'no-cors', body: new URLSearchParams(new FormData(contactForm)) });
        contactForm.classList.add('hidden');
        successMsg.classList.remove('hidden');
        requestAnimationFrame(() => { successMsg.scrollIntoView({ behavior:'smooth', block:'center' }); });
      } catch(err) {
        alert('騾壻ｿ｡繧ｨ繝ｩ繝ｼ縺檎匱逕溘＠縺ｾ縺励◆縲ゅ♀謇区焚縺ｧ縺吶′縲√♀髮ｻ隧ｱ縺ｫ縺ｦ縺雁撫縺・粋繧上○縺上□縺輔＞縲・nTEL: 04-7114-3274');
        submitBtn.innerHTML = orig;
        lucide.createIcons();
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-70');
      }
    });

    // MicroCMS 繝悶Ο繧ｰ蜿門ｾ・    (async () => {
      const container = document.getElementById('microcms-blog-container');
      if (!container) return;

      // API繧ｭ繝ｼ・遺ｻMicroCMS邂｡逅・判髱｢縺ｧ繝峨Γ繧､繝ｳ蛻ｶ髯舌・GET蟆ら畑縺ｫ險ｭ螳壽ｸ医∩縺ｧ縺ゅｋ縺薙→・・      const MICROCMS_API_KEY = '2BxAuwOHmLXSqUA7gHVTvV1SlPEJrbbWeDMW';
      const MICROCMS_ENDPOINT = 'https://hizakozou.microcms.io/api/v1/blogs?limit=3';

      try {
        const res = await fetch(MICROCMS_ENDPOINT, {
          headers: { 'X-MICROCMS-API-KEY': MICROCMS_API_KEY }
        });
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        const data = await res.json();
        
        if (!data.contents?.length) {
          container.innerHTML = '<p class="text-center text-slate-500 col-span-3 font-bold py-10">迴ｾ蝨ｨ縲∬ｨ倅ｺ九ｒ貅門ｙ荳ｭ縺ｧ縺吶・/p>';
          return;
        }

        container.innerHTML = data.contents.map(b => {
          const date = new Date(b.publishedAt).toLocaleDateString('ja-JP').replace(/\//g, '.');
          const img  = b.eyecatch?.url
            ? `${b.eyecatch.url}?w=600&h=400&fit=crop&fm=webp&q=75`
            : 'https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=600&q=80';
            
          return `<a href="blog-detail.html?id=${b.id}" class="group block bg-white rounded-3xl overflow-hidden card-shadow hover:shadow-xl transition-all duration-300 border border-slate-100">
            <div class="h-48 overflow-hidden bg-slate-100">
              <img src="${img}" alt="${b.title} | 謨ｴ菴馴劼縺ｲ縺悶％縺槭≧繝悶Ο繧ｰ" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy" decoding="async" width="600" height="400">
            </div>
            <div class="p-6">
              <p class="text-xs font-bold text-blue-600 mb-2 flex items-center gap-1">
                <i data-lucide="calendar" class="w-3 h-3" aria-hidden="true"></i>
                <time datetime="${b.publishedAt}">${date}</time>
              </p>
              <h3 class="text-base font-black text-slate-800 leading-tight group-hover:text-blue-600 transition">${b.title}</h3>
            </div>
          </a>`;
        }).join('');
        lucide.createIcons();
      } catch (err) {
        console.error('MicroCMS fetch error:', err);
        container.innerHTML = '<p class="text-center text-slate-500 col-span-3 font-bold py-10">險倅ｺ九ｒ蜿門ｾ励〒縺阪∪縺帙ｓ縺ｧ縺励◆縲・/p>';
      }
    })();

    // 繝ｩ繧､繝医・繝・け繧ｹ
    const lightbox      = document.getElementById('lightbox');
    const lightboxImg   = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');
    let triggerEl = null;

    function openLightbox(src, alt) {
      triggerEl = document.activeElement;
      lightboxImg.src = src; lightboxImg.alt = alt || '';
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(() => { lightbox.classList.remove('opacity-0'); lightboxImg.classList.remove('scale-95'); lightboxClose.focus(); });
    }
    function closeLightbox() {
      lightbox.classList.add('opacity-0'); lightboxImg.classList.add('scale-95');
      setTimeout(() => { lightbox.style.display='none'; lightboxImg.src=''; document.body.style.overflow=''; if(triggerEl) triggerEl.focus(); }, 300);
    }
    lightbox.addEventListener('click', e => { if(e.target===lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape' && lightbox.style.display==='flex') closeLightbox(); });
    lightbox.addEventListener('keydown', e => {
      if(e.key!=='Tab') return;
      const focusable = [...lightbox.querySelectorAll('button,[tabindex]:not([tabindex="-1"])')];
      const first = focusable[0], last = focusable[focusable.length-1];
      if(e.shiftKey ? document.activeElement===first : document.activeElement===last) { e.preventDefault(); (e.shiftKey?last:first).focus(); }
    });

    // 繧ｮ繝｣繝ｩ繝ｪ繝ｼ繧ｭ繝ｼ繝懊・繝画桃菴・    document.querySelectorAll('li[tabindex="0"]').forEach(el => {
      const img = el.querySelector('img');
      el.addEventListener('click', () => openLightbox(img.src, img.alt));
      el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); openLightbox(img.src, img.alt); } });
    });

    // 蝗ｺ螳咾TA繝舌・縺ｮ繧｢繧､繧ｳ繝ｳ繧貞・譛溷喧
    lucide.createIcons({ nodes: document.querySelectorAll('.fixed [data-lucide]') });

    // 繝倥ャ繝繝ｼ鬮倥＆縺ｫ蠢懊§縺ｦ繧ｹ繧ｯ繝ｭ繝ｼ繝ｫ菴咲ｽｮ繧定・蜍戊ｪｿ謨ｴ
    function syncHeaderHeight() {
      const h = document.getElementById('header')?.offsetHeight || 80;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }
    syncHeaderHeight();
    window.addEventListener('resize', syncHeaderHeight);
  </script>
</body>
